<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>まだ見てないアニメまとめ</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ヘッダー -->
    <header class="header">
      <h1>まだ見てないアニメまとめ</h1>
    </header>

    <!-- メイン -->
    <main class="anime-card">
      <!-- エラーメッセージ表示 -->
      <div id="error-message" class="error-message" style="display: none"></div>

      <!-- アニメ入力エリア -->
      <form id="anime-form" class="input-area" enctype="multipart/form-data">
        <div class="input-group">
          <input
            type="text"
            id="anime-input"
            class="anime-input"
            placeholder="アニメのタイトル..."
            maxlength="100"
            required
          />
          <textarea
            id="anime-memo"
            class="anime-memo"
            placeholder="感想やメモ（例: 〇話まで見た、作画最高）"
            rows="2"
          ></textarea>
          <div class="file-input-wrapper">
            <label for="anime-image">画像をアップロード：</label>
            <input type="file" id="anime-image" accept="image/*" />
          </div>
        </div>
        <button type="submit" class="anime-button">追加</button>
      </form>

      <!-- アニメリスト -->
      <ul id="anime-list" class="anime-list"></ul>
    </main>

    <!-- フッター -->
    <footer class="footer">
      <p>&copy; 2026 アニメまとめ App</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
